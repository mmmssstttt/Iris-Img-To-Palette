<!doctype html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Palette Extraction UI</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    body { background:#1a1a1a; color:#ececec; }
    .upload-area {
      border:2px dashed #4b4b4b;
      border-radius:12px;
      padding:3rem;
      text-align:center;
      cursor:pointer;
      background:#252525;
    }
    .upload-area.dragover {
      border-color:#4ade80;
      background:#2a352c;
    }
  </style>
</head>

<body class="p-6">

  <div class="max-w-4xl mx-auto flex flex-col items-center"
    x-data="paletteApp()"
    @pick-color.window="addColor($event.detail)"
    @set-extracted.window="setExtracted($event.detail)"
  >
    <h1 class="text-3xl font-bold mb-8">Core Colors Extraction</h1>

    <!-- FORM -->
    <form 
      class="w-full max-w-md"
      hx-post="/api/extract"
      hx-target="#result"
      hx-swap="innerHTML"
      enctype="multipart/form-data"

      hx-on::before-request="
        loading = true;
      "

      hx-on::after-request="
        loading = false;
      "
    >
      <!-- METHOD -->
      <select name="method"
        class="w-full mb-4 rounded-xl bg-[#252525] px-3 py-2">
        <option value="gwo">GWO</option>
        <option value="saliency">Saliency</option>
        <option value="k-means">K-Means</option>
      </select>

      <!-- UPLOAD -->
      <label class="upload-area block mb-6"
        @dragover.prevent="dragover=true"
        @dragleave="dragover=false"
        @drop.prevent="handleDrop($event)"
        :class="{ 'dragover': dragover }"
      >
        <span x-text="fileName || 'Click or drop image'"></span>

        <img x-show="preview" :src="preview" class="mt-3 max-h-48 mx-auto rounded" />

        <input type="file" name="image" class="hidden" @change="handleFile($event)">
      </label>

      <button type="submit"
        :disabled="loading"
        class="w-full bg-green-600 py-3 rounded-xl">
        <span x-show="!loading">Extract Colors</span>
        <span x-show="loading">Extracting...</span>
      </button>
    </form>

    <!-- SELECTED COLORS -->
    <div class="w-full mt-8 bg-[#252525] p-6 rounded-2xl">
      <div class="flex justify-between mb-4">
        <h2>
          Selected (<span x-text="selectedColors.length"></span>/10)
        </h2>

        <button 
          @click="recordData"
          :disabled="selectedColors.length !== maxColors"
          class="bg-blue-600 px-4 py-2 rounded disabled:opacity-50"
        >
          Record
        </button>
      </div>

      <div class="flex flex-wrap gap-4">
        <!-- SELECTED -->
        <template x-for="(c,i) in selectedColors" :key="i">
          <div class="flex flex-col items-center gap-2">
            <div class="relative">
              <div
                class="w-16 h-16 rounded-full cursor-move"
                :class="{ 'ring-2 ring-green-400 ring-offset-2 ring-offset-[#252525]': dragIndex === i }"
                :style="'background:'+c"
                draggable="true"
                @dragstart="startDrag(i)"
                @dragover.prevent
                @drop.prevent="dropOn(i)"
                @dragend="clearDrag()"
                :title="'Drag to reorder: '+c"
              >
              </div>

              <button
                type="button"
                class="absolute -top-2 -right-2 w-5 h-5 rounded-full bg-black/70 text-white text-xs leading-5"
                @click="removeColor(i)"
                title="Remove"
              >X</button>
            </div>

            <div class="flex gap-1">
              <button
                type="button"
                class="px-2 py-0.5 rounded bg-[#333] text-xs disabled:opacity-30"
                @click="moveColor(i, i - 1)"
                :disabled="i === 0"
                title="Move left"
              >L</button>
              <button
                type="button"
                class="px-2 py-0.5 rounded bg-[#333] text-xs disabled:opacity-30"
                @click="moveColor(i, i + 1)"
                :disabled="i === selectedColors.length - 1"
                title="Move right"
              >R</button>
            </div>
          </div>
        </template>

        <!-- EMPTY -->
        <template x-for="i in (maxColors - selectedColors.length)">
          <div class="w-16 h-16 rounded-full border-2 border-dashed border-gray-600"></div>
        </template>
      </div>
    </div>

    <!-- RESULT ( HTMX injection ) -->
    <div id="result"
      class="w-full mt-6"

      hx-on::after-swap="
        // Fetch color from elements returned by the server
        const colors = [...this.querySelectorAll('[data-color]')]
            .map(el => el.dataset.color);

        window.dispatchEvent(new CustomEvent('set-extracted', { detail: colors }));
      "
    ></div>
  </div>
  
  <script src="{{ url_for('static', path='js/index.js') }}"></script>
</body>

</html>
